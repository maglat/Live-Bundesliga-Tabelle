<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Bundesliga – Tabelle & Partien</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Reset & CSS Variables */
    *,*::before,*::after{box-sizing:border-box;}
    :root{
      --bg-color:#f5f7fa;
      --card-bg:#fff;
      --text-primary:#333;
      --text-secondary:#555;
      --accent:#2c3e50;
      --accent-hover:#1a252f;
      --border:#eaeaea;
      --shadow:0 2px 6px rgba(0,0,0,.1);
      --shadow-hover:0 6px 20px rgba(0,0,0,.12);
      --champions:#d4edda;
      --europa:#fff3cd;
      --relegation:#ffe5b4;
      --abstieg:#f8d7da;
      --highlight:#2c3e50;
    }
    body{
      font-family:'Quicksand',Arial,sans-serif;
      background:var(--bg-color);
      color:var(--text-primary);
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:2rem 1rem;
      transition:background-color .3s, color .3s;
    }
    .container{
      width:100%;
      max-width:900px;
    }
    /* Header */
    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:1rem;
      margin-bottom:1.5rem;
      padding:0 .3rem;
    }
    h2{
      color:var(--text-primary);
      margin:0;
      font-size:1.7rem;
      display:flex;
      align-items:center;
      gap:.5rem;
      transition:color .3s;
    }
    .header-icon{
      width:32px;height:32px;
      background:var(--highlight);
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#fff;
      font-size:.8rem;
      font-weight:700;
    }
    /* Button */
    .bmc-btn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 16px;
      font-family:'Quicksand',Arial,sans-serif;
      font-size:.9rem;
      font-weight:600;
      color:#292929;
      background:#FFDD00;
      border:2px solid #292929;
      border-radius:20px;
      text-decoration:none;
      transition:transform .2s cubic-bezier(0.4,0,0.2,1), box-shadow .2s cubic-bezier(0.4,0,0.2,1), background .2s;
      box-shadow:2px 2px 0 #292929;
    }
    .bmc-btn:hover{ transform:translate(-2px,-2px); box-shadow:4px 4px 0 #292929; }
    .bmc-btn:active{ transform:translate(0,0); box-shadow:2px 2px 0 #292929; }
    /* Controls */
    .controls{
      display:flex; align-items:center; gap:1rem; margin-bottom:1rem; flex-wrap:wrap; padding:0 .3rem;
    }
    .control-group{ display:flex; align-items:center; gap:.5rem; }
    label{ font-size:.95rem; color:var(--text-secondary); }
    select{
      padding:.5rem .6rem; font-size:.95rem; border:1px solid #bbb; border-radius:4px;
      background:var(--card-bg); color:var(--text-primary); cursor:pointer;
      transition:border-color .2s, box-shadow .2s;
    }
    select:hover,select:focus{
      border-color:var(--highlight); outline:none; box-shadow:0 0 0 3px rgba(44,62,80,.15);
    }
    .refresh-btn{
      background:transparent; border:1px solid var(--border); color:var(--text-secondary);
      padding:.5rem .8rem; border-radius:4px; cursor:pointer; font-size:.9rem;
      display:flex; align-items:center; gap:.4rem; transition:all .2s;
    }
    .refresh-btn:hover{ border-color:var(--highlight); color:var(--text-primary); background:rgba(44,62,80,.05); }
    .refresh-btn.loading svg{ animation:spin .8s linear infinite; }
    .refresh-btn.active{ background:var(--highlight); color:#fff; border-color:var(--highlight); }
    .auto-refresh{
      display:flex; align-items:center; gap:.6rem; font-size:.88rem; color:var(--text-secondary);
    }
    .switch{
      position:relative; width:44px; height:24px; background:var(--border);
      border-radius:20px; cursor:pointer; transition:background .2s;
    }
    .switch::after{
      content:''; position:absolute; top:2px; left:2px; width:20px; height:20px;
      background:var(--card-bg); border-radius:50%; box-shadow:0 1px 3px rgba(0,0,0,.3);
      transition:transform .2s;
    }
    .switch.active{ background:var(--highlight); }
    .switch.active::after{ transform:translateX(20px); }
    @keyframes spin{100%{transform:rotate(360deg);}}
    /* Tabs */
    .tabs{
      display:flex; gap:.5rem; margin-bottom:1rem; border-bottom:2px solid var(--border);
      padding-bottom:.5rem;
    }
    .tab-btn{
      background:var(--card-bg); border:1px solid var(--border); color:var(--text-secondary);
      padding:.6rem 1.2rem; border-radius:4px 4px 0 0; font-size:.95rem; font-weight:600;
      cursor:pointer; transition:all .2s;
    }
    .tab-btn:hover{ background:rgba(44,62,80,.05); color:var(--text-primary); }
    .tab-btn.active{
      border-bottom:2px solid transparent; background:var(--card-bg); color:var(--highlight);
      box-shadow:0 -3px 8px rgba(0,0,0,.06);
    }
    .info{
      margin:.6rem 0 .8rem;
      font-size:.95rem;
      color:var(--text-secondary);
      padding:0 .3rem;
      display:flex;
      align-items:center;
      gap:.5rem;
    }
    .info span{font-weight:600;color:var(--text-primary);}
    /* Loading */
    .loader{
      font-size:.9rem;
      color:var(--text-secondary);
      padding:2rem;
      text-align:center;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:.6rem;
    }
    .loader:empty{display:none;}
    .loader-spinner{
      width:20px;height:20px; border:2px solid var(--border); border-top-color:var(--highlight);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    .loader-spinner{
      width:20px;height:20px; border:2px solid var(--border); border-top-color:var(--highlight);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin{100%{transform:rotate(360deg);}}
    /* Table */
    table{
      border-collapse:separate; border-spacing:0; width:100%;
      background:var(--card-bg); border-radius:8px; overflow:hidden; box-shadow:var(--shadow);
      transition:box-shadow .3s;
    }
    table:hover{ box-shadow:var(--shadow-hover); }
    th,td{ padding:.75rem .5rem; text-align:center; font-size:.94rem; }
    th{ background:var(--highlight); color:#fff; font-weight:600; }
    tbody tr{ border-bottom:1px solid var(--border); transition:transform .25s cubic-bezier(0.4,0,0.2,1), box-shadow .25s, background-color .25s; }
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{ transform:translateY(-3px); box-shadow:var(--shadow-hover); background:rgba(44,62,80,.04); }
    .team-cell{ display:flex; align-items:center; gap:.4rem; }
    .team-cell img{ width:24px; height:24px; object-fit:contain; transition:transform .2s; }
    tbody tr:hover .team-cell img{ transform:scale(1.1); }
    .champions{background:var(--champions) !important;}
    .europa{background:var(--europa) !important;}
    .relegation{background:var(--relegation) !important;}
    .abstieg{background:var(--abstieg) !important;}
    th:nth-child(1),td:nth-child(1){width:3%;}
    th:nth-child(2),td:nth-child(2){width:35%;text-align:left;padding-left:.8rem;}
    th:nth-child(3),td:nth-child(3){width:8%;}
    th:nth-child(4),td:nth-child(4){width:8%;}
    th:nth-child(5),td:nth-child(5){width:8%;}
    th:nth-child(6),td:nth-child(6){width:8%;}
    th:nth-child(7),td:nth-child(7){width:8%;}
    th:nth-child(8),td:nth-child(8){width:10%;font-weight:600;}
    /* Legend */
    .legend{ margin-top:1.5rem; padding:1.2rem 1rem; background:var(--card-bg); border-radius:8px; box-shadow:var(--shadow); }
    .legend-title{ font-size:.85rem; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--text-secondary); margin-bottom:.8rem; }
    .legend-items{ display:flex; flex-wrap:wrap; gap:1.2rem; }
    .legend-item{ display:flex; align-items:center; gap:.5rem; font-size:.9rem; color:var(--text-secondary); }
    .legend-color{ width:12px; height:12px; border-radius:3px; }
    /* Matches */
    .match-card{
      background:var(--card-bg); border-radius:8px; margin-bottom:.5rem; padding:1rem;
      box-shadow:var(--shadow); display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
      gap:1rem; transition:transform .2s, box-shadow .2s;
    }
    .match-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow-hover); }
    .match-teams{
      display:flex; flex-direction:column; gap:.3rem; flex:1; min-width:120px;
    }
    .team-row{
      display:flex; align-items:center; gap:.5rem; width:100%;
    }
    .team-row.home{ flex-direction:row; }
    .team-row.away{ flex-direction:row-reverse; }
    .team-row img{ width:24px; height:24px; object-fit:contain; }
    .team-row span{ font-size:.92rem; font-weight:500; min-width:0; flex:1; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .team-row.away span{ text-align:left; }
    .match-result{
      display:flex; align-items:center; justify-content:center; gap:.6rem; min-width:80px; text-align:center;
    }
    .result-score{
      font-size:1.6rem; font-weight:700; color:var(--highlight); letter-spacing:1px;
    }
    .result-status{
      font-size:.7rem; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.5px; margin-top:.1rem;
    }
    .result-time{ font-size:.82rem; color:#888; min-width:35px; text-align:right; }
    .match-time{ font-size:.82rem; color:#888; margin-top:.2rem; }
    /* Views */
    .view-section{ display:none; }
    .view-section.active{ display:block; }
    .empty-state{
      padding:3rem; text-align:center; color:var(--text-secondary); font-size:1rem;
    }
    /* Responsive */
    @media (max-width:640px){
      body{padding:1rem;} h2{font-size:1.4rem;} .controls{gap:.8rem;}
      label,select,th,td,.info,.legend-item{font-size:.85rem;} th,td{padding:.6rem .35rem;}
      .match-card{ flex-direction:row; align-items:flex-start; }
      .match-result{ flex-direction:column; gap:.1rem; margin:.2rem 0; }
    }
    @media (max-width:440px){
      th:nth-child(2),td:nth-child(2){width:30%;padding-left:.5rem;} .legend-items{gap:.8rem;}
    }
    .fade-in{animation:fadeIn .6s ease-out;}
    .slide-down{animation:slideDown .5s ease-out;}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideDown{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
    /* Modal */
    .modal-overlay{
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,.7); display:none; justify-content:center;
      align-items:center; z-index:9999; padding:1rem;
      animation:fadeIn .2s ease;
    }
    .modal-overlay.active{display:flex;}
    .modal-content{
      background:var(--card-bg); border-radius:12px; max-width:600px; width:100%;
      max-height:90vh; overflow-y:auto; box-shadow:0 10px 40px rgba(0,0,0,.4);
      animation:slideDown .2s ease;
    }
    .modal-header{
      background:var(--highlight); color:#fff; padding:1.2rem 1.5rem;
      border-radius:12px 12px 0 0; display:flex; justify-content:space-between;
      align-items:center; font-weight:600; font-size:1.1rem;
    }
    .modal-close{
      background:rgba(255,255,255,.2); border:none; color:#fff;
      width:32px; height:32px; border-radius:50%; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem; transition:background .2s;
    }
    .modal-close:hover{background:rgba(255,255,255,.3);}
    .modal-body{padding:1.5rem;}
    .match-info-row{
      display:flex; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem;
      padding-bottom:1.5rem; border-bottom:1px solid var(--border);
    }
    .match-info-item{
      flex:1; min-width:120px; display:flex; flex-direction:column;
    }
    .match-info-label{font-size:.78rem; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.5px; margin-bottom:.2rem;}
    .match-info-value{font-size:.95rem; font-weight:500; color:var(--text-primary);}
    .section-title{
      font-size:.85rem; font-weight:600; text-transform:uppercase; color:var(--text-secondary);
      margin:1.2rem 0 .6rem; letter-spacing:.5px;
    }
    .events-list{display:flex; flex-direction:column; gap:.4rem;}
    .event-row{
      display:flex; align-items:center; gap:.6rem; padding:.5rem;
      background:rgba(44,62,80,.04); border-radius:6px; font-size:.92rem;
    }
    .event-row.goal{border-left:3px solid #2c5530;}
    .event-row.ycard{border-left:3px solid #c98d00;}
    .event-row.rcard{border-left:3px solid #b00;}
    .event-row.sub{border-left:3px solid #0066cc;}
    .event-time{min-width:35px; font-weight:600; color:var(--highlight); font-size:.85rem;}
    .event-icon{font-size:1.1rem; flex-shrink:0;}
    .event-desc{flex:1; min-width:0;}
    .event-player{font-weight:500;}
    .event-detail{color:var(--text-secondary); font-size:.82rem;}
    .sub-detail{display:flex; gap:.4rem; align-items:center;}
    .sub-detail span:first-child{color:var(--text-secondary);}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h2><span class="header-icon">🇩🇪</span>Bundesliga</h2>
      <a href="https://buymeacoffee.com/maglat" target="_blank" class="bmc-btn" aria-label="Buy me a coffee">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#292929" width="18" height="18">
          <path d="M4.5 3h15a1.5 1.5 0 0 1 1.5 1.5v1.5H3V4.5A1.5 1.5 0 0 1 4.5 3zm2.25 5.25a.75.75 0 1 0 0 1.5h4.5a.75.75 0 1 0 0-1.5h-4.5zm1.5 3a.75.75 0 1 0 0 1.5h4.5a.75.75 0 1 0 0-1.5h-4.5z"/>
          <path d="M4.5 12h15v6a4.5 4.5 0 0 1-4.5 4.5h-6A4.5 4.5 0 0 1 4.5 18v-6z"/>
        </svg>
        Buy me a coffee
      </a>
    </header>
    
    <div class="controls">
      <div class="control-group">
        <label for="league">Liga:</label>
        <select id="league">
          <option value="bl1">1. Bundesliga</option>
          <option value="bl2">2. Bundesliga</option>
          <option value="bl3">3. Liga</option>
        </select>
      </div>
      <div class="control-group">
        <label for="season">Saison:</label>
        <select id="season"></select>
      </div>
      <button class="refresh-btn" id="refreshBtn" aria-label="Aktualisieren">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
        aktualisieren
      </button>
      <div class="auto-refresh">
        <span>Auto (60s)</span>
        <div class="switch" id="autoRefreshSwitch"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('table')" id="tab-table">Tabelle</button>
      <button class="tab-btn" onclick="switchTab('matches')" id="tab-matches">Partien</button>
    </div>

    <!-- TABLE VIEW -->
    <div id="view-table" class="view-section active">
      <p class="info">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Aktueller Spieltag: <span id="matchday">‑</span> / <span id="totalMatchdays">34</span>
      </p>

      <p class="loader" id="table-loader"><span class="loader-spinner"></span> Lade Tabelle …</p>

      <table id="tbl">
        <thead>
          <tr>
            <th>#</th>
            <th>Mannschaft</th>
            <th>Sp.</th>
            <th>S</th>
            <th>U</th>
            <th>V</th>
            <th>+/-</th>
            <th>Pkt.</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div class="legend">
        <div class="legend-title">Legende</div>
        <div class="legend-items">
          <div class="legend-item"><span class="legend-color" style="background:#d4edda;"></span> Champions‑League (1‑4)</div>
          <div class="legend-item"><span class="legend-color" style="background:#fff3cd;"></span> Europa‑League (5‑6)</div>
          <div class="legend-item"><span class="legend-color" style="background:#ffe5b4;"></span> Relegation (16)</div>
          <div class="legend-item"><span class="legend-color" style="background:#f8d7da;"></span> Abstieg (17‑18)</div>
        </div>
      </div>
    </div>

    <!-- MATCHES VIEW -->
    <div id="view-matches" class="view-section">
      <div class="controls">
        <div class="control-group">
          <label for="matchday-select">Spieltag:</label>
          <select id="matchday-select"></select>
        </div>
      </div>

      <div id="matches-container">
        <p class="loader" id="matches-loader"><span class="loader-spinner"></span> Lade Partien …</p>
      </div>
    </div>
  </div>

  <!-- Match Details Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modal-title">Spieldetails</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body">
        <p class="loader"><span class="loader-spinner"></span> Lade Details …</p>
      </div>
    </div>
  </div>

  <script>
const leagueSelect  = document.getElementById('league');
const seasonSelect  = document.getElementById('season');
const matchdaySpan  = document.getElementById('matchday');
const totalMatchdaysSpan = document.getElementById('totalMatchdays');
const refreshBtn = document.getElementById('refreshBtn');
const matchdaySelect = document.getElementById('matchday-select');
const autoRefreshSwitch = document.getElementById('autoRefreshSwitch');

let autoRefreshTimer = null;
let isAutoRefreshActive = false;

    let currentMatchday = null;
    let currentSeason = null;
    let currentLeague = null;

    // Current date & season
    const now = new Date();
    const nowYear = now.getFullYear();
    const nowMonth = now.getMonth() + 1;
    const currentSeasonStart = nowMonth >= 7 ? nowYear : nowYear - 1;

    // Season dropdown
    const start = nowYear - 5;
    const end = nowYear + 1;
    for (let yr = start; yr <= end; yr++) {
      const opt = document.createElement('option');
      opt.value = yr;
      opt.textContent = `${yr}/${yr+1}`;
      seasonSelect.appendChild(opt);
    }
    seasonSelect.value = currentSeasonStart;
    currentSeason = currentSeasonStart;
    currentLeague = leagueSelect.value;

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + tab).classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
      
      if(tab === 'matches') {
        loadMatches();
      }
    }

    // Load table
    function loadTable(season, league) {
      const apiUrl = `https://api.openligadb.de/getbltable/${league}/${season}`;
      const loader = document.getElementById('table-loader');
      loader.innerHTML = '<span class="loader-spinner"></span> Lade Tabelle …';
      
      const leagueName = league === 'bl1' ? '1. Bundesliga' : league === 'bl2' ? '2. Bundesliga' : '3. Liga';
      const totalMd = (league === 'bl3' ? 38 : 34);
      totalMatchdaysSpan.textContent = totalMd;
      
      fetch(apiUrl)
        .then(r=>{ if (!r.ok) throw new Error('Network response was not ok'); return r.json(); })
        .then(data=>{
          loader.innerHTML = '';
          const tbody = document.querySelector('#tbl tbody');
          tbody.innerHTML = '';
          currentMatchday = Math.max(...data.map(t=>t.matches));
          matchdaySpan.textContent = currentMatchday || '‑';
          
          // Update matchday select
          matchdaySelect.innerHTML = '';
          for(let i=1; i<=totalMd; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `Spieltag ${i}`;
            matchdaySelect.appendChild(opt);
          }
          matchdaySelect.value = currentMatchday;
          
          data.forEach((team,i)=>{
            const tr = document.createElement('tr');
            tr.classList.add('fade-in','slide-down');
            const pos = i+1;
            if (pos<=4) tr.classList.add('champions');
            else if (pos<=6) tr.classList.add('europa');
            else if (pos===16) tr.classList.add('relegation');
            else if (pos>=17) tr.classList.add('abstieg');
            const logo = team.teamIconUrl ? `<img src="${team.teamIconUrl}" alt="" loading="lazy">` : '';
            tr.innerHTML = `
              <td>${pos}</td>
              <td class="team-cell">${logo}<span>${team.teamName}</span></td>
              <td>${team.matches}</td>
              <td>${team.won}</td>
              <td>${team.draw}</td>
              <td>${team.lost}</td>
              <td>${team.goalDiff}</td>
              <td>${team.points}</td>
            `;
            tbody.appendChild(tr);
          });
        })
        .catch(err=>{
          console.error(err);
          loader.innerHTML = '❌ Daten konnten nicht geladen werden.';
          matchdaySpan.textContent = '‑';
        });
    }
    
    // Global storage for match day data (to avoid CORS issues)
    var cachedMatchdayData = null;
    
    // Load matches
    function loadMatches() {
      const season = seasonSelect.value;
      const league = leagueSelect.value;
      const md = matchdaySelect.value;
      const container = document.getElementById('matches-container');
      container.innerHTML = '<p class="loader"><span class="loader-spinner"></span> Lade Partien …</p>';
      
      apiUrl(`https://api.openligadb.de/getmatchdata/${league}/${season}/${md}`)
        .then(matches=>{
          // Cache the data for use in modal
          cachedMatchdayData = { league, season, md, matches };
          
          container.innerHTML = '';
          if(!matches || matches.length===0) {
            container.innerHTML = '<div class="empty-state">Keine Partien für diesen Spieltag verfügbar.</div>';
            return;
          }
          matches.forEach(match => {
            const homeName = match.team1?.teamName || '';
            const awayName = match.team2?.teamName || '';
            const homeLogo = match.team1?.teamIconUrl || '';
            const awayLogo = match.team2?.teamIconUrl || '';
            const isFinished = match.matchIsFinished;
            const matchID = match.matchID;
            const startTime = match.matchDateTime ? new Date(match.matchDateTime).toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}) : '-';
            
            // Get final score from matchResults
            const finalResult = match.matchResults?.find(r => r.resultTypeID === 2);
            const homeGoals = finalResult?.pointsTeam1 ?? (isFinished ? null : 0);
            const awayGoals = finalResult?.pointsTeam2 ?? (isFinished ? null : 0);
            
            const card = document.createElement('div');
            card.className = 'match-card fade-in';
            card.style.cursor = 'pointer';
            card.onclick = () => showMatchDetails(match);
            
            let scoreHtml = '';
            let statusHtml = '';
            
            if (isFinished) {
              scoreHtml = `<div class="result-score">${homeGoals}:${awayGoals}</div>`;
              statusHtml = `<div class="result-status">beendet</div>`;
            } else {
              scoreHtml = `<div class="result-score">‑:‑</div>`;
              statusHtml = `<div class="result-status">${startTime}</div>`;
            }
            
            card.innerHTML = `
              <div class="match-teams">
                <div class="team-row home"><div><img src="${homeLogo}" alt="" loading="lazy"></div><span>${homeName}</span></div>
                <div class="team-row away"><div><img src="${awayLogo}" alt="" loading="lazy"></div><span>${awayName}</span></div>
              </div>
              <div class="match-result">
                ${scoreHtml}
                ${statusHtml}
              </div>
            `;
            container.appendChild(card);
          });
        })
        .catch(err=>{
          console.error(err);
          container.innerHTML = '<div class="empty-state">❌ Daten konnten nicht geladen werden.</div>';
        });
    }
    
    // Show match details from cached data (no CORS issues since we already have it!)
    function showMatchDetails(match) {
      const modal = document.getElementById('modal');
      const modalBody = document.getElementById('modal-body');
      const modalTitle = document.getElementById('modal-title');
      
      const homeTeam = match.team1;
      const awayTeam = match.team2;
      const isFinished = match.matchIsFinished;
      const startTime = match.matchDateTime ? new Date(match.matchDateTime).toLocaleString('de-DE', {hour:'2-digit', minute:'2-digit'}) : '-' ;
      
      // Get final score from matchResults
      const finalResult = match.matchResults?.find(r => r.resultTypeID === 2);
      const homeGoals = finalResult?.pointsTeam1 ?? 0;
      const awayGoals = finalResult?.pointsTeam2 ?? 0;
      
      modalTitle.textContent = `${homeTeam.teamName} vs ${awayTeam.teamName}`;
      modal.classList.add('active');
      
      let html = `
        <div class="match-info-row">
          <div class="match-info-item">
            <span class="match-info-label">Ergebnis</span>
            <span class="match-info-value">${isFinished ? `${homeGoals}:${awayGoals}` : '‑:‑'}</span>
          </div>
          <div class="match-info-item">
            <span class="match-info-label">Status</span>
            <span class="match-info-value">${isFinished ? 'Beendet' : startTime}</span>
          </div>
          <div class="match-info-item">
            <span class="match-info-label">Liga</span>
            <span class="match-info-value">${cachedMatchdayData.season}/${cachedMatchdayData.season+1}</span>
          </div>
        </div>
        <div class="match-info-row" style="border-bottom:none;padding-bottom:0;margin-bottom:0.5rem;">
          <div class="match-info-item">
            <span class="match-info-label">Spieltag</span>
            <span class="match-info-value">${cachedMatchdayData.md}</span>
          </div>
        </div>`;
        
        // Parse matchEvents for goals and cards
        // Event types: 705001=goal, 705004=yellow card, 705005=red card
        const events = match.matchEvents || [];
        const goals = events.filter(e => e.resultEventID === 705001);
        const cards = events.filter(e => e.resultEventID === 705004 || e.resultEventID === 705005);
        
        // Goals section
        html += `<h3 class="section-title">⚽ Tore</h3>`;
        html += `<div class="events-list">`;
        if(goals.length > 0) {
          goals.forEach(goal => {
            const minute = goal.minute || '?';
            const player = goal.name || 'Unbekannt';
            const forHomeTeam = goal.pointsTeam1 > 0;
            const teamName = forHomeTeam ? homeTeam.teamName : awayTeam.teamName;
            html += `
              <div class="event-row goal">
                <span class="event-time">${minute}'</span>
                <span class="event-icon">⚽</span>
                <span class="event-player">${player}</span>
                <span class="event-detail">für ${teamName}</span>
              </div>`;
          });
        } else {
          html += '<div class="match-info-item" style="padding:1rem 0;"><span class="match-info-label">Tore</span><span class="match-info-value">Keine Tore</span></div>';
        }
        html += `</div>`;
        
        // Cards section  
        html += `<h3 class="section-title">🟨 Karten</h3>`;
        html += `<div class="events-list">`;
        if(cards.length > 0) {
          cards.forEach(card => {
            const minute = card.minute || '?';
            const player = card.name || 'Unbekannt';
            const isRed = card.resultEventID === 705005;
            const icon = isRed ? '🟥' : '🟨';
            const className = isRed ? 'rcard' : 'ycard';
            html += `
              <div class="event-row ${className}">
                <span class="event-time">${minute}'</span>
                <span class="event-icon">${icon}</span>
                <span class="event-player">${player}</span>
              </div>`;
          });
        } else {
          html += '<div class="match-info-item" style="padding:1rem 0;"><span class="match-info-label">Karten</span><span class="match-info-value">Keine Karten</span></div>';
        }
        html += `</div>`;
        
        modalBody.innerHTML = html;
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    // Close on outside click
    document.getElementById('modal').addEventListener('click', (e) => {
      if(e.target.id === 'modal') closeModal();
    });
    
    // Close on Escape key
    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') closeModal();
    });

    // Helper fetch
    function apiUrl(url) {
      return fetch(url).then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); });
    }

    // Refresh all
    function refresh() {
      currentSeason = seasonSelect.value;
      currentLeague = leagueSelect.value;
      loadTable(currentSeason, currentLeague);
      // If matches tab is active, load matches too
      if(document.getElementById('view-matches').classList.contains('active')) {
        loadMatches();
      }
    }

  // Toggle auto-refresh
  function toggleAutoRefresh() {
    isAutoRefreshActive = !isAutoRefreshActive;
    autoRefreshSwitch.classList.toggle('active', isAutoRefreshActive);
    refreshBtn.classList.toggle('active', isAutoRefreshActive);
    
    if (isAutoRefreshActive) {
      autoRefresh();
    } else {
      clearTimeout(autoRefreshTimer);
    }
  }
  
  function autoRefresh() {
    refresh();
    autoRefreshTimer = setTimeout(autoRefresh, 60000);
  }
  
  // Cleanup on unload
  window.addEventListener('beforeunload', ()=>{
    clearTimeout(autoRefreshTimer);
  });

  // Event listeners
  leagueSelect.addEventListener('change', refresh);
  seasonSelect.addEventListener('change', refresh);
  matchdaySelect.addEventListener('change', loadMatches);
  autoRefreshSwitch.addEventListener('click', toggleAutoRefresh);
  refreshBtn.addEventListener('click', ()=>{
    refreshBtn.classList.add('loading');
    refresh();
    setTimeout(()=>refreshBtn.classList.remove('loading'), 500);
  });

  // Initial load
  refresh();
  </script>
</body>
</html>
